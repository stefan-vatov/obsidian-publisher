name: Bump

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      release_tag: ${{ steps.release_ref.outputs.release_tag }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install cargo-edit
        run: cargo install cargo-edit --version 0.13

      - name: Bump version and push tag
        id: bump
        uses: cocogitto/cocogitto-action@v4.1.0
        with:
          command: bump
          args: --auto --skip-ci
          git-user: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com

      - name: Resolve release ref
        id: release_ref
        run: echo "release_tag=v${{ steps.bump.outputs.version }}" >> "${GITHUB_OUTPUT}"

  release:
    needs: bump
    uses: ./.github/workflows/release.yml
    with:
      release_tag: ${{ needs.bump.outputs.release_tag }}
    secrets: inherit
